<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bosscar — Hashamatli detailing · Toshkent</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: rgba(241,199,103,.28); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: var(--ink-700); border-radius: 8px; }

    /* Hide scrollbar on slider rails */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }

    /* Lucide icon sizing helper */
    [data-lucide] { display: inline-block; vertical-align: middle; }
  </style>

  <!-- React 18 + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <!-- Lucide icons (thin line, closest match to Bosscar spec) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Trilingual strings — must load before JSX components -->
  <script src="i18n.js"></script>

  <!-- Components (load order matters: dependencies first) -->
  <script type="text/babel" src="NavHero.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Gallery.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>

  <!-- Root app — mounts everything -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
